[tools]
cmake = "latest"
ninja = "latest"
emsdk = "latest"
watchexec = "latest"
node = "22"

[tasks.desktop]
description = "Build (if needed) and run the desktop app"
run = """
cmake --preset desktop
cmake --build build/desktop
./build/desktop/parametrix
"""

[tasks.wasm]
description = "Build (if needed) and serve the WASM app on http://localhost:8080"
run = """
cmake --preset wasm
cmake --build build/wasm
echo "Serving at http://localhost:8080/"
python3 -m http.server 8080 --directory build/wasm
"""

[tasks.test-install]
description = "Install Playwright and its Chromium browser (run once after cloning)"
run = """
npm install
npx playwright install chromium
"""

[tasks.test]
description = "Run Playwright e2e tests (requires a WASM build in build/wasm)"
run = "npx playwright test"

[tasks.test-ui]
description = "Open Playwright's interactive test UI"
run = "npx playwright test --ui"
