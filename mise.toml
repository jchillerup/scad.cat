[tools]
cmake = "latest"
ninja = "latest"
emsdk = "latest"
watchexec = "latest"
node = "22"
jq = "latest"
ripgrep = "latest"

[tasks.desktop]
description = "Build (if needed) and run the desktop app"
run = """
cmake --preset desktop
cmake --build build/desktop
./build/desktop/parametrix
"""

[tasks.openscad-image]
description = "Build the parametrix-openscad container image (requires podman or docker)"
run = """
RUNTIME=$(command -v podman || command -v docker)
$RUNTIME build --security-opt seccomp=unconfined \
    -t parametrix-openscad -f docker/openscad.dockerfile .
"""

[tasks.desktop-docker]
description = "Build (if needed) and run the desktop app using containerised OpenSCAD"
run = """
cmake --preset desktop-docker
cmake --build build/desktop-docker
./build/desktop-docker/parametrix
"""

[tasks.build-openscad]
description = "Compile OpenSCAD from source to WASM (requires Docker or Podman); updates web/openscad-wasm-dist/"
run = "./openscad-lib/build-wasm.sh"

[tasks.wasm]
description = "Build (if needed) and serve the WASM app on http://localhost:8080"
run = """
cmake --preset wasm
cmake --build build/wasm
echo "Serving at http://localhost:8080/"
python3 -m http.server 8080 --directory build/wasm
"""

[tasks.test-install]
description = "Install Playwright and its Chromium browser (run once after cloning)"
run = """
npm install
npx playwright install chromium
"""

[tasks.test]
description = "Run Playwright e2e tests (requires a WASM build in build/wasm)"
run = "npx playwright test"

[tasks.test-ui]
description = "Open Playwright's interactive test UI"
run = "npx playwright test --ui"

[tasks.browse]
description = "Open the WASM app in a Playwright-managed Chromium browser for manual testing"
run = """
python3 -m http.server 8081 --directory build/wasm &
SERVER_PID=$!
trap "kill $SERVER_PID" EXIT
npx playwright open --browser chromium http://localhost:8081
"""

[tasks.test-record]
description = "Open Playwright codegen to record a new test (starts HTTP server automatically)"
run = """
python3 -m http.server 8080 --directory build/wasm &
SERVER_PID=$!
trap "kill $SERVER_PID" EXIT
npx playwright codegen http://localhost:8080
"""
