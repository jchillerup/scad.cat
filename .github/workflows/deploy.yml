name: Build & Deploy

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: jdx/mise-action@v2

      - name: Cache openscad-wasm assets
        uses: actions/cache@v4
        with:
          path: web/openscad-wasm-dist
          key: openscad-wasm-2022.03.20

      - name: Configure (WASM)
        run: mise exec -- cmake --preset wasm

      - name: Build (WASM)
        run: mise exec -- cmake --build build/wasm

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/wasm --project-name=scadcat --commit-dirty=true
