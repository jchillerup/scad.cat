name: Build & Deploy

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: jdx/mise-action@v2

      - name: Configure (WASM)
        run: mise exec -- cmake --preset wasm

      - name: Build (WASM)
        run: mise exec -- cmake --build build/wasm

      - name: Install Playwright and Chromium
        run: |
          mise exec -- npm install
          mise exec -- npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: mise exec -- npx playwright test --forbid-only
        env:
          CI: true

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/wasm --project-name=scadcat --branch=${{ github.ref_name }} --commit-dirty=true
